title: "mdeurell.github.io"
description: "Minimalistisk Jekyll + Tailwind starter"
url: "https://mdeurell.github.io"
baseurl: ""

# Build settings
markdown: kramdown
permalink: pretty
future: false
# Force rebuild every time
incremental: false

# Cache busting
sass:
  style: compressed

exclude:
  - README.md
  - .idea/
  - .vscode/
  - vendor/
  - node_modules/
  - Gemfile
  - Gemfile.lock
