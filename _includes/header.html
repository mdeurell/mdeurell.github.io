<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto max-w-6xl px-6 py-10">
    <div class="mb-5 flex flex-wrap items-center gap-2 text-sm text-slate-500">
      <a href="{{ '/' | relative_url }}" class="hover:text-slate-900">Home</a>
      <span>/</span>
      <span class="text-slate-900">{{ page.title | default: 'Untitled' }}</span>
    </div>

    <div class="max-w-3xl">
      <p class="mb-3 text-xs font-semibold uppercase tracking-[0.22em] text-slate-500">
        Minimal Jekyll starter
      </p>
      <h1 class="text-4xl font-extrabold tracking-tight text-slate-950 sm:text-5xl">
        Et roligt udgangspunkt til dit GitHub Pages-site
      </h1>
      <p class="mt-5 text-lg leading-8 text-slate-600">
        Denne struktur bruger Jekyll includes til at splitte siden op i mindre dele,
        mens Tailwind stadig er den primære CSS-pakke.
      </p>
    </div>
  </div>
</header>
