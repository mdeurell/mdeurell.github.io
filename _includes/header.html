<header class="border-b border-slate-700/70 bg-transparent">
  <div class="mx-auto max-w-6xl px-6 py-10">
    <div class="mb-5 flex flex-wrap items-center gap-2 text-sm text-slate-400">
      <a href="{{ '/' | relative_url }}" class="hover:text-slate-100">About</a>
      <span>/</span>
      <span class="text-slate-100">{{ page.title | default: 'Untitled' }}</span>
    </div>

    <div class="max-w-3xl">
      <p class="mb-3 text-xs font-semibold uppercase tracking-[0.22em] text-slate-400">
        Minimal Jekyll starter
      </p>
      <h1 class="text-4xl font-extrabold tracking-tight text-slate-100 sm:text-5xl">
        Et roligt udgangspunkt til dit GitHub Pages-site
      </h1>
      <p class="mt-5 text-lg leading-8 text-slate-300">
        Denne struktur bruger Jekyll includes til at splitte siden op i mindre dele,
        mens Tailwind stadig er den primære CSS-pakke.
      </p>
    </div>
  </div>
</header>
