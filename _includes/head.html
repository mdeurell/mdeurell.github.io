<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ page.description | default: site.description }}">
<!-- Aggressive cache control -->
<meta http-equiv="Cache-Control" content="max-age=0, no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<!-- Force refresh on load -->
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Cache buster script - load first -->
<script src="{{ '/assets/js/cache-buster.js' | relative_url }}"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- CSS with cache buster -->
<link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}?v={{ site.time | date: '%s' }}" />


<script>
  // Overlay functionality
  function openOverlay(htmlFile = 'test.html') {
    const overlay = document.getElementById('contentOverlay');
    const iframe = document.getElementById('overlayFrame');
    iframe.src = htmlFile;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeOverlay() {
    const overlay = document.getElementById('contentOverlay');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('DOMContentLoaded', function() {
    const overlay = document.getElementById('contentOverlay');
    if (overlay) {
      overlay.addEventListener('click', function(e) {
        if (e.target === this) {
          closeOverlay();
        }
      });

      const closeBtn = document.querySelector('.overlay-close');
      if (closeBtn) {
        closeBtn.addEventListener('click', closeOverlay);
      }
    }

    // Close overlay on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && document.getElementById('contentOverlay').classList.contains('active')) {
        closeOverlay();
      }
    });
  });
</script>
